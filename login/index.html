<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="泽丰住宅机电客户登录入口，预留访问码进入专属项目、预算与交付资料。"
    />
    <meta name="robots" content="noindex, nofollow" />
    <title>客户登录 | ZEFENG MEP</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../launch-polish.css" />
  </head>
  <body class="route-page">
    <main class="route-hero">
      <div class="route-topbar">
        <a class="brand-mark" href="../" aria-label="回到首页">
          <img class="brand-logo-symbol" src="../images/zefeng-logo-mark.webp" alt="" />
          <span class="brand-lockup">
            <strong>ZEFENG MEP</strong>
            <small>HIGH-END RESIDENTIAL MEP SYSTEMS</small>
          </span>
        </a>
        <a class="route-back" href="../index.html#project-access">返回专属方案入口</a>
      </div>

      <section class="route-stage">
        <figure class="route-media">
          <img src="../images/project-flow-start.webp" alt="高端住宅项目启动桌面场景，图纸、记录与自然光共同表达客户登录入口" />
        </figure>

        <div class="route-copy">
          <p class="eyebrow">Client Login</p>
          <h1>客户登录</h1>
          <p class="hero-subtitle">访问码是进入专属项目资料的第一步。</p>
          <p class="route-lead">当前入口已预留访问码、专属方案、预算与交付资料的承接结构，后续可直接接入真实客户项目。</p>
          <blockquote class="route-quote">从一次沟通开始，到系统方案落地，入口应该始终围绕同一个家。</blockquote>

          <div class="route-meta">
            <div class="route-meta-card">
              <span>登录方式</span>
              <strong>专属访问码 / 后续可扩展手机号或项目编号</strong>
            </div>
            <div class="route-meta-card">
              <span>登录后内容</span>
              <strong>项目方案、配置清单、预算结构、交付资料</strong>
            </div>
          </div>

          <div class="route-inline-form">
            <form class="access-card" action="../index.html#project-access" method="get">
              <label>
                访问码
                <input type="text" name="code" placeholder="请输入专属访问码" autocomplete="off" />
              </label>
              <button class="button primary" type="submit">进入项目入口</button>
              <p>提交后将返回专属方案入口页，并保留访问码参数。</p>
            </form>
          </div>

          <div class="route-actions">
            <a class="button ghost" href="../">返回首页</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
